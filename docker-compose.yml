services:
  prompt_game:
    build: .
    restart: always
    ports:
      - "6502:8080"
    logging:
      driver: 'json-file'
      options:
        max-size: 1m
        max-file: '16'
    environment:
      - TZ=Europe/Vienna
      - ROCKET_ADDRESS=0.0.0.0
      - ROCKET_PORT=8080
    extra_hosts:
      - "host.docker.internal:host-gateway"